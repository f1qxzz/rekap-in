openapi: 3.0.3
info:
  title: Absensi Attendance API
  version: 1.0.0
  description: API untuk absensi mobile, HR admin, izin/cuti, laporan, dan payroll.
servers:
  - url: http://localhost:8080/api
paths:
  /auth/register:
    post:
      summary: Register karyawan baru
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: User dibuat dan link verifikasi dikirim
  /auth/login:
    post:
      summary: Login dan terima access token + refresh token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Token valid
  /attendance/clock:
    post:
      summary: Simpan absensi masuk/pulang/lembur dengan GPS dan foto
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AttendanceClockRequest"
      responses:
        "201":
          description: Absensi tersimpan
        "403":
          description: Mock location, GPS buruk, atau luar radius
  /attendance/offline-sync:
    post:
      summary: Sinkronisasi antrean absensi offline
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Hasil sinkronisasi per entri
  /leave-requests:
    post:
      summary: Ajukan izin atau cuti
      security:
        - bearerAuth: []
      responses:
        "201":
          description: Pengajuan dibuat
  /admin/shifts:
    get:
      summary: List shift
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
    post:
      summary: Buat shift
      security:
        - bearerAuth: []
      responses:
        "201":
          description: Shift dibuat
  /admin/offices:
    get:
      summary: List lokasi kantor
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
    post:
      summary: Tambah lokasi kantor dan radius
      security:
        - bearerAuth: []
      responses:
        "201":
          description: Lokasi dibuat
  /admin/anomalies:
    get:
      summary: List absensi anomali
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
  /admin/audit-logs:
    get:
      summary: Audit log append-only
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
  /attendance/summary:
    get:
      summary: Summary untuk integrasi payroll
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: month
          schema:
            type: string
            pattern: "^\\d{4}-\\d{2}$"
          required: true
        - in: query
          name: userId
          schema:
            type: string
      responses:
        "200":
          description: Summary payroll
  /reports/export:
    get:
      summary: Export laporan CSV, PDF, atau Excel
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: month
          required: true
          schema:
            type: string
        - in: query
          name: format
          schema:
            type: string
            enum: [csv, pdf, xlsx]
      responses:
        "200":
          description: File laporan
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    RegisterRequest:
      type: object
      required: [name, email, nip, password]
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        nip:
          type: string
        departmentId:
          type: string
        phone:
          type: string
        password:
          type: string
          minLength: 8
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
    AttendanceClockRequest:
      type: object
      required: [type, timestamp, latitude, longitude, accuracy, faceDetected]
      properties:
        type:
          type: string
          enum: [MASUK, PULANG, LEMBUR]
        timestamp:
          type: string
          format: date-time
        latitude:
          type: number
        longitude:
          type: number
        accuracy:
          type: number
        provider:
          type: string
        photoUrl:
          type: string
        photoBase64:
          type: string
        photoHash:
          type: string
        faceMatchScore:
          type: number
        faceDetected:
          type: boolean
        deviceId:
          type: string
        platform:
          type: string
          enum: [android, ios]
        isMockLocationDetected:
          type: boolean

