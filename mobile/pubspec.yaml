name: absensi_mobile
description: Aplikasi absensi karyawan Android dan iOS.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  camera: ^0.11.0+2
  crypto: ^3.0.6
  dio: ^5.7.0
  encrypt: ^5.0.3
  firebase_messaging: ^15.1.6
  flutter_secure_storage: ^9.2.2
  geolocator: ^13.0.2
  google_maps_flutter: ^2.10.0
  google_mlkit_face_detection: ^0.12.0
  image: ^4.3.0
  intl: ^0.19.0
  local_auth: ^2.3.0
  path: ^1.9.0
  path_provider: ^2.1.5
  permission_handler: ^11.3.1
  sqflite: ^2.4.1
  uuid: ^4.5.1
  workmanager: ^0.9.0+3
  open_filex: ^4.7.0
  file_selector: ^1.1.0
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

dependency_overrides:
  path_provider_foundation: 2.5.1
  camera_android_camerax:
    path: third_party/flutter_plugins/camera_android_camerax
  file_selector_android:
    path: third_party/flutter_plugins/file_selector_android
  google_maps_flutter_android:
    path: third_party/flutter_plugins/google_maps_flutter_android
  workmanager_android:
    path: third_party/flutter_plugins/workmanager_android

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/logo/
